version: '3.8'

services:
  claude-code:
    build:
      context: .
      dockerfile: Dockerfile
    image: claude-code-rust:latest
    container_name: claude-code
    
    # 交互式终端
    stdin_open: true
    tty: true
    
    # 卷挂载
    volumes:
      # 配置文件持久化
      - claude-config:/home/claude/.rustcode
      # 可选：挂载项目目录
      # - .:/workspace
    
    # 网络（可选）
    networks:
      - claude-network
    
    # 重启策略
    restart: no

volumes:
  claude-config:
    driver: local

networks:
  claude-network:
    driver: bridge

# ==========================================
# 使用说明：
# ==========================================
# 
# 1. 启动 REPL 交互模式：
#    docker-compose run --rm claude-code repl
#
# 2. 执行单次查询：
#    docker-compose run --rm claude-code query --prompt "你的问题"
#
# 3. 查看版本：
#    docker-compose run --rm claude-code --version
#
# 4. 查看帮助：
#    docker-compose run --rm claude-code --help
#
# 5. 首次运行时进入 onboarding 配置 provider / model / fallback：
#    docker-compose run --rm claude-code
#
